openapi: 3.1.0
info:
  title: API da Plataforma — Metrito
  version: "3.0"
  description: |
    API para autenticação e consulta de recursos da plataforma Metrito (projetos, conexões).
    Utilizada para obter tokens JWT e listar recursos disponíveis para o usuário autenticado.

servers:
  - url: https://api.metrito.com
    description: Produção

paths:
  /v3/auth/login:
    post:
      operationId: login
      summary: Autenticar na plataforma
      description: |
        Autentica o usuário com e-mail e senha e retorna um token JWT para uso nas demais rotas autenticadas.

        O token retornado deve ser enviado no header `Authorization: Bearer {token}` em todas as requisições autenticadas.
      x-mint:
        metadata:
          title: Login
        content: |
          ## Uso do Token

          O token JWT retornado tem validade de **7 dias**. Após expirar, faça login novamente.

          Envie o token em todas as requisições autenticadas:

          ```bash
          curl -X GET https://api.metrito.com/v3/projects \
            -H "Authorization: Bearer {token}"
          ```

          <Warning>Este endpoint é destinado a integrações server-to-server. Para a maioria dos casos de uso, recomendamos usar **API Keys** (chaves de serviço) que não expiram e têm escopos granulares. Veja a [página de autenticação](/api-reference/authentication) para mais detalhes.</Warning>
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
            examples:
              default:
                summary: Login padrão
                value:
                  email: usuario@empresa.com
                  password: suaSenhaSegura123
      responses:
        "200":
          description: Login realizado com sucesso
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
              example:
                token: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
                user:
                  id: 60f1b2c3d4e5f6a7b8c9d0e1
                  name: João Silva
                  email: usuario@empresa.com
                  role: owner
        "400":
          description: Credenciais inválidas ou campos ausentes
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                invalidCredentials:
                  summary: Credenciais inválidas
                  value:
                    error: Invalid credentials
                    message: E-mail ou senha incorretos

  /v3/projects:
    get:
      operationId: listProjects
      summary: Listar projetos do usuário
      description: |
        Retorna todos os projetos (brands) que o usuário autenticado tem acesso.

        Cada projeto contém um `id` que é usado como `project_id` nas demais APIs (Data API, conexões, etc.).
      x-mint:
        metadata:
          title: Listar Projetos
        content: |
          ## Autenticação

          Este endpoint aceita dois formatos de autenticação:

          1. **JWT da plataforma**
             - Header: `Authorization: Bearer {jwt}`

          2. **API Key do Metrito**
             - Header: `Authorization: Bearer mtk_live_...` **ou** `x-api-key: mtk_live_...`
             - Requer escopo `data:read`
             - Retorna todos os projetos do workspace vinculado à chave
      security:
        - bearerAuth: []
        - apiKeyAuth: []
      responses:
        "200":
          description: Lista de projetos retornada com sucesso
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Project"
              example:
                - id: 69162064162b926ae607959b
                  name: Minha Loja Online
                  description: E-commerce de roupas
                  logo: https://storage.metrito.com/logos/minhaloja.png
                  workspace_id: 60f1b2c3d4e5f6a7b8c9d0e1
                - id: 69162064162b926ae607960c
                  name: SaaS App
                  description: null
                  logo: null
                  workspace_id: 60f1b2c3d4e5f6a7b8c9d0e1
        "401":
          description: Token ausente ou inválido
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: Unauthorized
                message: Token inválido ou expirado

  /v3/projects/{project_id}/connections:
    get:
      operationId: listConnections
      summary: Listar conexões de um projeto
      description: |
        Retorna todas as conexões (fontes de dados) vinculadas a um projeto específico.

        Cada conexão representa uma conta de anúncios ou fonte de dados integrada (Meta Ads, Google Ads, TikTok Ads, etc.).
      x-mint:
        metadata:
          title: Listar Conexões
        content: |
          ## Autenticação

          Este endpoint aceita dois formatos de autenticação:

          1. **JWT da plataforma**
             - Header: `Authorization: Bearer {jwt}`

          2. **API Key do Metrito**
             - Header: `Authorization: Bearer mtk_live_...` **ou** `x-api-key: mtk_live_...`
             - Requer escopo `data:read`
             - O projeto deve pertencer ao workspace vinculado à chave
      security:
        - bearerAuth: []
        - apiKeyAuth: []
      parameters:
        - name: project_id
          in: path
          required: true
          description: ID do projeto.
          schema:
            type: string
            example: 69162064162b926ae607959b
      responses:
        "200":
          description: Lista de conexões retornada com sucesso
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Connection"
              example:
                - id: 64a1b2c3d4e5f6a7b8c9d0e1
                  source: Meta Ads
                  source_id: "act_123456789"
                  name: "Conta Principal Meta"
                  status: active
                  workspace_id: 60f1b2c3d4e5f6a7b8c9d0e1
                  webhook_url: null
                - id: 64a1b2c3d4e5f6a7b8c9d0e2
                  source: Google Ads
                  source_id: "123-456-7890"
                  name: "Google Ads Loja"
                  status: active
                  workspace_id: 60f1b2c3d4e5f6a7b8c9d0e1
                  webhook_url: null
                - id: 64a1b2c3d4e5f6a7b8c9d0e3
                  source: Personalizado
                  source_id: null
                  name: "Webhook Hotmart"
                  status: active
                  workspace_id: 60f1b2c3d4e5f6a7b8c9d0e1
                  webhook_url: "https://api.metrito.com/v2/tracking/generic?k=abc123"
        "400":
          description: Projeto não encontrado ou sem permissão
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: Not Found
                message: "Access denied: User doesn't have read permissions for this project"

  /v3/connections/{connectionId}/objects:
    put:
      operationId: updateAdObjects
      summary: Atualizar objetos de anúncios
      description: |
        Pausar, ativar ou alterar o orçamento de campanhas, conjuntos de anúncios ou anúncios em lote.

        Cada item no array `updates` recebe **exatamente um** dos campos `status` ou `budget` — nunca ambos.

        O orçamento deve ser enviado em **centavos da moeda da conta** (ex: `5000` = R$ 50,00 ou US$ 50,00).
        O Metrito detecta automaticamente se a campanha usa orçamento diário ou vitalício.
      x-mint:
        metadata:
          title: Atualizar Objetos de Anúncios
        content: |
          ## Identificando a conexão

          O parâmetro `connectionId` aceita dois formatos:

          | Formato | Exemplo | Quando usar |
          |---------|---------|-------------|
          | ID Metrito | `64a1b2c3d4e5f6a7b8c9d0e1` | Padrão — obtido via `GET /v3/projects/:id/connections` |
          | ID da conta Meta | `act_123456789` ou `123456789` | Quando você já tem o ID da conta de anúncios |

          ## Tipos de objeto suportados

          | `type` | O que representa |
          |--------|-----------------|
          | `campaign` | Campanha |
          | `adset` | Conjunto de anúncios |
          | `ad` | Anúncio individual |

          ## Operações por objeto

          | Operação | Campo | Valores aceitos | Suporta |
          |----------|-------|-----------------|---------|
          | Pausar / Ativar | `status` | `"ACTIVE"`, `"PAUSED"` | campaign, adset, ad |
          | Alterar orçamento | `budget` | Inteiro positivo em centavos | campaign, adset |

          > **Nota:** Anúncios não possuem orçamento próprio. Use `campaign` ou `adset` para alterar orçamento.

          ## Misturar operações em uma chamada

          Você pode misturar operações de `status` e `budget` no mesmo array `updates`. O Metrito agrupa e processa cada tipo separadamente.

          ## Exemplos de uso

          **Pausar uma campanha:**
          ```json
          {
            "type": "campaign",
            "updates": [
              { "id": "120215678901234567", "status": "PAUSED" }
            ]
          }
          ```

          **Ativar múltiplos anúncios:**
          ```json
          {
            "type": "ad",
            "updates": [
              { "id": "120215678901234567", "status": "ACTIVE" },
              { "id": "120215678901234568", "status": "ACTIVE" }
            ]
          }
          ```

          **Alterar orçamento de múltiplas campanhas:**
          ```json
          {
            "type": "campaign",
            "updates": [
              { "id": "120215678901234567", "budget": 10000 },
              { "id": "120215678901234568", "budget": 5000 }
            ]
          }
          ```

          **Pausar e alterar orçamento na mesma chamada:**
          ```json
          {
            "type": "campaign",
            "updates": [
              { "id": "120215678901234567", "status": "PAUSED" },
              { "id": "120215678901234568", "budget": 10000 }
            ]
          }
          ```
      security:
        - bearerAuth: []
        - apiKeyAuth: []
      parameters:
        - name: connectionId
          in: path
          required: true
          description: |
            ID da conexão no Metrito (`64a1b2c3d4e5f6a7b8c9d0e1`) **ou** ID da conta de anúncios na plataforma (`act_123456789` para Meta Ads).
          schema:
            type: string
            example: 64a1b2c3d4e5f6a7b8c9d0e1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [type, updates]
              properties:
                type:
                  type: string
                  enum: [campaign, adset, ad]
                  description: Tipo do objeto a ser atualizado.
                  example: campaign
                updates:
                  type: array
                  minItems: 1
                  description: |
                    Lista de objetos a atualizar. Cada item deve conter `id` e **exatamente um** de `status` ou `budget`.
                  items:
                    type: object
                    required: [id]
                    properties:
                      id:
                        type: string
                        description: ID do objeto na plataforma de anúncios (Meta, Google, etc.).
                        example: "120215678901234567"
                      status:
                        type: string
                        enum: [ACTIVE, PAUSED]
                        description: Novo status do objeto. Não pode ser enviado junto com `budget`.
                        example: PAUSED
                      budget:
                        type: integer
                        minimum: 1
                        description: |
                          Novo valor de orçamento em **centavos** da moeda da conta.
                          O tipo (diário ou vitalício) é detectado automaticamente.
                          Não pode ser enviado junto com `status`. Não aplicável a `ad`.
                        example: 5000
            examples:
              pauseCampaign:
                summary: Pausar uma campanha
                value:
                  type: campaign
                  updates:
                    - id: "120215678901234567"
                      status: "PAUSED"
              activateAds:
                summary: Ativar múltiplos anúncios
                value:
                  type: ad
                  updates:
                    - id: "120215678901234567"
                      status: "ACTIVE"
                    - id: "120215678901234568"
                      status: "ACTIVE"
              updateBudget:
                summary: Alterar orçamento de campanhas
                value:
                  type: campaign
                  updates:
                    - id: "120215678901234567"
                      budget: 10000
                    - id: "120215678901234568"
                      budget: 5000
              mixedOperations:
                summary: Pausar e alterar orçamento na mesma chamada
                value:
                  type: campaign
                  updates:
                    - id: "120215678901234567"
                      status: "PAUSED"
                    - id: "120215678901234568"
                      budget: 10000
      responses:
        "200":
          description: Todas as atualizações foram aplicadas com sucesso.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdUpdateResponse"
              example:
                success: true
                summary:
                  total: 2
                  successful: 2
                  failed: 0
                results:
                  - id: "120215678901234567"
                    success: true
                    error: null
                  - id: "120215678901234568"
                    success: true
                    error: null
        "207":
          description: Algumas atualizações falharam (resposta parcial).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdUpdateResponse"
              example:
                success: false
                summary:
                  total: 2
                  successful: 1
                  failed: 1
                results:
                  - id: "120215678901234567"
                    success: true
                    error: null
                  - id: "120215678901234568"
                    success: false
                    error:
                      message: "Campaign is not active and cannot be paused"
                      code: 1487065
        "400":
          description: Parâmetros inválidos ou malformados.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                success: false
                error:
                  type: validation_error
                  code: invalid_parameter
                  message: "type must be one of: campaign, adset, ad"
        "401":
          description: Credencial ausente ou inválida.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Conexão não encontrada no workspace.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                success: false
                error:
                  type: not_found_error
                  code: resource_not_found
                  message: 'Connection "act_123456789" not found in this workspace.'
        "422":
          description: Plataforma não suportada para esta operação.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                success: false
                error:
                  type: platform_error
                  code: PLATFORM_NOT_SUPPORTED
                  message: 'Platform "google-ads" does not support ad management operations yet.'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT or API Key
      description: JWT da plataforma ou API key `mtk_live_...` enviada no header Authorization
    apiKeyAuth:
      type: apiKey
      in: header
      name: x-api-key
      description: API key `mtk_live_...` enviada via header `x-api-key`

  schemas:
    LoginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
          description: E-mail da conta Metrito
          example: usuario@empresa.com
        password:
          type: string
          description: Senha da conta
          example: suaSenhaSegura123

    LoginResponse:
      type: object
      properties:
        token:
          type: string
          description: Token JWT para autenticação nas demais rotas
        user:
          type: object
          properties:
            id:
              type: string
              description: ID do usuário
            name:
              type: string
              description: Nome do usuário
            email:
              type: string
              description: E-mail do usuário
            role:
              type: string
              description: Papel do usuário no workspace
              enum:
                - owner
                - admin
                - member
                - viewer

    Project:
      type: object
      properties:
        id:
          type: string
          description: ID do projeto (usar como `project_id` nas demais APIs)
        name:
          type: string
          description: Nome do projeto
        description:
          type: string
          nullable: true
          description: Descrição do projeto
        logo:
          type: string
          nullable: true
          description: URL do logo do projeto
        workspace_id:
          type: string
          description: ID do workspace ao qual o projeto pertence

    Connection:
      type: object
      properties:
        id:
          type: string
          description: ID da conexão
        source:
          type: string
          description: Nome da fonte de dados (Meta Ads, Google Ads, TikTok Ads, Personalizado, etc.)
        source_id:
          type: string
          nullable: true
          description: ID da conta na plataforma de origem (ex. act_123456 para Meta)
        name:
          type: string
          description: Nome dado à conexão pelo usuário
        status:
          type: string
          description: Status atual da conexão
          enum:
            - active
            - error
            - paused
            - disabled
        workspace_id:
          type: string
          description: ID do workspace
        webhook_url:
          type: string
          nullable: true
          description: URL do webhook (apenas para conexões do tipo Personalizado)

    AdUpdateResponse:
      type: object
      properties:
        success:
          type: boolean
          description: True only if every update in the batch succeeded.
        summary:
          type: object
          properties:
            total:
              type: integer
            successful:
              type: integer
            failed:
              type: integer
        results:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
                description: ID do objeto atualizado.
              success:
                type: boolean
              error:
                type: object
                nullable: true
                description: Detalhes do erro da plataforma, quando presente.

    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          example: false
        error:
          type: object
          properties:
            type:
              type: string
              description: Categoria do erro.
              enum:
                - authentication_error
                - authorization_error
                - validation_error
                - not_found_error
                - platform_error
                - api_error
            code:
              type: string
              description: Código de erro específico.
            message:
              type: string
              description: Descrição legível do erro.
